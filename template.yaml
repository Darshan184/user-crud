AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  user-crud-1
  Sample SAM Template for user-crud-1

Globals:
  Function:
    Timeout: 20
    MemorySize: 512
    Runtime: java21
    Environment:
      Variables:
        TABLE_NAME: UsersTable1

Resources:
  MyApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Auth:
        DefaultAuthorizer: CustomAuth
        Authorizers:
          CustomAuth:
            FunctionArn: !GetAtt AuthFunction.Arn
            Identity:
              Header: Authorization

  UserCrudFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: usercrud.UserHandler::handleRequest
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable1
      Events:
        CreateUser:
          Type: Api
          Properties:
            Path: /users
            Method: post
            RestApiId: !Ref MyApi
        UserOperations:
          Type: Api
          Properties:
            Path: /users/{id}
            Method: get
            RestApiId: !Ref MyApi
        DeleteOperations:
          Type: Api
          Properties:
            Path: /users
            Method: any
            RestApiId: !Ref MyApi

  BulkUserfunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: usercrud.BulkUsersHandler::handleRequest
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable1
      Events:
        CreateUser:
          Type: Api
          Properties:
            Path: /users/list
            Method: post
            RestApiId: !Ref MyApi

  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: usercrud.AuthHandler::handleRequest

  UsersTable1:
    Type: AWS::Serverless::SimpleTable
    Properties:
      PrimaryKey:
        Name: email
        Type: String
      TableName: UsersTable1

  AuthFunctionInvocationPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt AuthFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${MyApi}/*/*/*"

Outputs:
  ApiUrl:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${MyApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/users"